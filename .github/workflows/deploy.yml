name: Construir y publicar galería

# Se dispara al hacer push, manualmente, o cuando un repo fuente envía
# un repository_dispatch tras aportar una nueva gráfica.
on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [nueva-grafica]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Las gráficas (public/graficas, public/datos, src/manifest.json) se generan
      # localmente con viz/ y se commitean. El CI solo construye la galería Astro.
      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
